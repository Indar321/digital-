<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitalTrade.ai</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">
  <div class="container nav-inner">
    <div class="logo">DigitalTrade.ai</div>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1 class="glow">We Build Digital Brands</h1>
  <p>Design. Development. Growth.</p>
  <a href="#contact" class="btn">Start Project</a>
</section>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Branding</div>
    <div class="card">UI/UX</div>
    <div class="card">Web Design</div>
    <div class="card">Shopify</div>
  </div>
</section>

<section id="work" class="section dark">
  <h2>Our Work</h2>
  <p>Coming Soon...</p>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <form class="form">
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
